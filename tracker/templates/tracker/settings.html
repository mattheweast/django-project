<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-900">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Settings</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="h-full">
  <main class="relative isolate flex min-h-screen items-center justify-center overflow-hidden px-6 py-10">
    <div class="absolute inset-0 -z-10 bg-[radial-gradient(circle_at_top,rgba(99,102,241,0.25),transparent_45%),radial-gradient(circle_at_bottom_right,rgba(16,185,129,0.2),transparent_40%)]"></div>

    <section class="w-full max-w-xl rounded-3xl border border-white/10 bg-gray-900/70 p-8 shadow-2xl shadow-black/40 backdrop-blur sm:p-10">
      <header class="mb-6">
        <h1 class="text-2xl font-semibold tracking-tight text-white">Settings</h1>
      </header>

      {% if messages %}
        <div class="mb-5 space-y-2">
          {% for message in messages %}
            <p class="rounded-lg px-3 py-2 text-sm {% if message.tags == 'success' %}border border-emerald-400/30 bg-emerald-500/10 text-emerald-200{% else %}border border-red-400/30 bg-red-500/10 text-red-200{% endif %}">{{ message }}</p>
          {% endfor %}
        </div>
      {% endif %}

      <form method="post" action="{% url 'tracker:currency_update' %}" class="space-y-4">
        {% csrf_token %}
        <div>
          <label for="currency" class="block text-sm font-medium text-gray-200">Default currency</label>
          <select id="currency" name="currency" class="mt-2 block w-full rounded-xl border border-white/10 bg-white/5 px-4 py-2.5 text-sm text-white focus:border-indigo-400 focus:outline-none focus:ring-2 focus:ring-indigo-500/40">
            {% for code, label in currency_choices %}
              <option value="{{ code }}" {% if code == selected_currency %}selected{% endif %} class="bg-gray-900 text-white">{{ label }}</option>
            {% endfor %}
          </select>
          <p class="mt-2 text-xs text-gray-400">New items use this currency automatically, and dashboard totals render in this currency.</p>
        </div>

        <div class="flex items-center justify-end">
          <button type="submit" class="rounded-lg bg-indigo-500 px-4 py-2 text-sm font-semibold text-white hover:bg-indigo-400">Save settings</button>
        </div>
      </form>
    </section>
  </main>
</body>
</html>
