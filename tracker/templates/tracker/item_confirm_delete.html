<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-900">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Delete Item</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="h-full">
  <main class="relative isolate flex min-h-screen items-center justify-center overflow-hidden px-6 py-10">
    <div class="absolute inset-0 -z-10 bg-[radial-gradient(circle_at_top,rgba(99,102,241,0.25),transparent_45%),radial-gradient(circle_at_bottom_right,rgba(239,68,68,0.2),transparent_40%)]"></div>

    <section class="w-full max-w-lg rounded-3xl border border-white/10 bg-gray-900/70 p-8 shadow-2xl shadow-black/40 backdrop-blur sm:p-10">
      <h1 class="text-2xl font-semibold tracking-tight text-white">Delete item</h1>
      <p class="mt-3 text-sm text-gray-300">Are you sure you want to delete <span class="font-semibold text-white">{{ item.name }}</span>? This cannot be undone.</p>

      <form method="post" class="mt-8 flex items-center justify-end gap-3">
        {% csrf_token %}
        <a href="{% url 'tracker:home' %}" class="rounded-lg bg-white/10 px-4 py-2 text-sm font-semibold text-white hover:bg-white/20">Cancel</a>
        <button type="submit" class="rounded-lg bg-red-500 px-4 py-2 text-sm font-semibold text-white hover:bg-red-400">Delete</button>
      </form>
    </section>
  </main>
</body>
</html>
