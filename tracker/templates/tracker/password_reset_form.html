<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-900">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="h-full">
  <main class="relative isolate flex min-h-screen items-center justify-center overflow-hidden px-6 py-10">
    <div class="absolute inset-0 -z-10 bg-[radial-gradient(circle_at_top,rgba(99,102,241,0.25),transparent_45%),radial-gradient(circle_at_bottom_right,rgba(16,185,129,0.2),transparent_40%)]"></div>

    <section class="w-full max-w-lg rounded-3xl border border-white/10 bg-gray-900/70 p-8 shadow-2xl shadow-black/40 backdrop-blur sm:p-10">
      <h1 class="text-2xl font-semibold tracking-tight text-white">Reset your password</h1>
      <p class="mt-2 text-sm text-gray-300">Enter your account email and we’ll send you a reset link.</p>

      {% if messages %}
        <div class="mt-4 space-y-2">
          {% for message in messages %}
            <p class="rounded-lg px-3 py-2 text-sm {% if message.tags == 'success' %}border border-emerald-400/30 bg-emerald-500/10 text-emerald-200{% else %}border border-red-400/30 bg-red-500/10 text-red-200{% endif %}">{{ message }}</p>
          {% endfor %}
        </div>
      {% endif %}

      <form method="post" class="mt-8 space-y-5">
        {% csrf_token %}
        <div>
          <label for="id_email" class="block text-sm font-medium text-gray-200">Email address</label>
          <input
            id="id_email"
            name="email"
            type="email"
            required
            class="mt-2 block w-full rounded-xl border border-white/10 bg-white/5 px-4 py-2.5 text-sm text-white placeholder:text-gray-500 focus:border-indigo-400 focus:outline-none focus:ring-2 focus:ring-indigo-500/40"
            placeholder="you@example.com"
          />
        </div>

        <button
          type="submit"
          class="inline-flex w-full items-center justify-center rounded-xl bg-indigo-500 px-4 py-2.5 text-sm font-semibold text-white transition hover:bg-indigo-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2 focus:ring-offset-gray-900"
        >
          Send reset link
        </button>
      </form>

      <p class="mt-6 text-sm text-gray-400">
        Remembered your password?
        <a href="{% url 'tracker:login' %}" class="font-medium text-indigo-300 hover:text-indigo-200">Back to sign in</a>
      </p>
    </section>
  </main>
</body>
</html>
