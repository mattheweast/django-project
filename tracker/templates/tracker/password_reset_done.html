<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-900">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Check Your Email</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="h-full">
  <main class="relative isolate flex min-h-screen items-center justify-center overflow-hidden px-6 py-10">
    <div class="absolute inset-0 -z-10 bg-[radial-gradient(circle_at_top_left,rgba(99,102,241,0.25),transparent_45%),radial-gradient(circle_at_bottom_right,rgba(16,185,129,0.2),transparent_40%)]"></div>

    <section class="w-full max-w-lg rounded-3xl border border-white/10 bg-gray-900/70 p-8 shadow-2xl shadow-black/40 backdrop-blur sm:p-10">
      <h1 class="text-2xl font-semibold tracking-tight text-white">Check your email</h1>
      <p class="mt-3 text-sm leading-6 text-gray-300">
        If that address exists in our system, we just sent a password reset link.
      </p>
      <a href="{% url 'tracker:login' %}" class="mt-6 inline-flex rounded-xl bg-indigo-500 px-4 py-2.5 text-sm font-semibold text-white hover:bg-indigo-400">Back to sign in</a>
    </section>
  </main>
</body>
</html>
