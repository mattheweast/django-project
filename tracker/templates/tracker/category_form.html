<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-900">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Add Category</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="h-full">
  <main class="relative isolate flex min-h-screen items-center justify-center overflow-hidden px-6 py-10">
    <div class="absolute inset-0 -z-10 bg-[radial-gradient(circle_at_top,rgba(99,102,241,0.25),transparent_45%),radial-gradient(circle_at_bottom_right,rgba(236,72,153,0.2),transparent_40%)]"></div>

    <section class="w-full max-w-lg rounded-3xl border border-white/10 bg-gray-900/70 p-8 shadow-2xl shadow-black/40 backdrop-blur sm:p-10">
      <h1 class="text-2xl font-semibold tracking-tight text-white">Create category</h1>
      <p class="mt-2 text-sm text-gray-300">Use categories to organize your items.</p>

      <form method="post" class="mt-8 space-y-5">
        {% csrf_token %}
        <div>
          <label for="id_name" class="block text-sm font-medium text-gray-200">Category name</label>
          <input id="id_name" name="name" type="text" value="{{ form.name.value|default:'' }}" required class="mt-2 block w-full rounded-xl border border-white/10 bg-white/5 px-4 py-2.5 text-sm text-white placeholder:text-gray-500 focus:border-indigo-400 focus:outline-none focus:ring-2 focus:ring-indigo-500/40" placeholder="Electronics" />
          {% if form.name.errors %}
            <p class="mt-2 text-sm text-red-300">{{ form.name.errors|striptags }}</p>
          {% endif %}
        </div>

        <div class="flex items-center justify-end gap-3">
          <a href="{% url 'tracker:home' %}" class="rounded-lg bg-white/10 px-4 py-2 text-sm font-semibold text-white hover:bg-white/20">Cancel</a>
          <button type="submit" class="rounded-lg bg-indigo-500 px-4 py-2 text-sm font-semibold text-white hover:bg-indigo-400">Save category</button>
        </div>
      </form>
    </section>
  </main>
</body>
</html>
